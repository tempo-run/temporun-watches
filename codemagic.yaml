workflows:
  temporun-watch-ios:
    name: TempoRun Watch — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: claude/peaceful-noether-VC4aB
          include: true

    environment:
      # A Apple exige o SDK do iOS 26 (Xcode 26+) para uploads ao ASC.
      # Antes pinavamos o 16 para fugir do exportArchive recusando app-store,
      # mas agora empacotamos o IPA manualmente, entao o Xcode 26 e seguro.
      xcode: latest
      groups:
        - TEMPORUN-WATCH-SECRETS
      vars:
        # Agora arquivamos o app iOS stub (contêiner), que embarca o watch app.
        XCODE_SCHEME: TempoRunStub
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.temporun.watch

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        working_directory: apple
        script: xcodegen generate

      - name: Definir build number (CFBundleVersion)
        working_directory: apple
        script: |
          set -e
          # A versao precisa ser maior que qualquer build ja enviado ao ASC.
          # Usa o BUILD_NUMBER do Codemagic (auto-incrementa); se vazio ou
          # invalido, cai para o epoch Unix (sempre crescente e < 2^32).
          BUILD_NUM="${BUILD_NUMBER:-}"
          case "$BUILD_NUM" in
            ''|*[!0-9]*) BUILD_NUM=$(date +%s) ;;
            *) [ "$BUILD_NUM" -lt 2 ] && BUILD_NUM=$(date +%s) || true ;;
          esac
          echo "CFBundleVersion = $BUILD_NUM"

          for plist in Stub/Info.plist TempoRunWatch/Info.plist TempoRunWatch/WidgetExtension-Info.plist; do
            if [ -f "$plist" ]; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$plist" \
                || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUM" "$plist"
              echo " - $plist => $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$plist")"
            else
              echo "AVISO: $plist nao encontrado (xcodegen ainda nao gerou?)"
            fi
          done

      - name: Aplicar profiles no projeto
        working_directory: apple
        script: xcode-project use-profiles

      - name: Diagnostico — entitlements dos profiles instalados
        working_directory: apple
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          XCODE_PROFILES_HOME="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          echo "=== Entitlements de cada profile instalado ==="
          for profile in "$PROFILES_HOME"/*.mobileprovision "$XCODE_PROFILES_HOME"/*.mobileprovision; do
            [ -f "$profile" ] || continue
            security cms -D -i "$profile" > /tmp/prof.plist 2>/dev/null
            NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/prof.plist 2>/dev/null)
            BUNDLE=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/prof.plist 2>/dev/null)
            HK=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.healthkit" /tmp/prof.plist 2>/dev/null || echo "NAO PRESENTE")
            echo "  Profile: $NAME  |  Bundle: $BUNDLE  |  HealthKit: $HK"
          done
          echo ""
          echo "=== CODE_SIGN_ENTITLEMENTS no pbxproj ==="
          grep -n "CODE_SIGN_ENTITLEMENTS" TempoRunWatch.xcodeproj/project.pbxproj || echo "(nao encontrado)"

      - name: Build IPA (archive + empacotar)
        working_directory: apple
        script: |
          set -e

          # 1. Mapear os tres profiles instalados (stub iOS, watch app, widget)
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          XCODE_PROFILES_HOME="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"

          STUB_PROFILE_NAME=""
          WATCH_PROFILE_NAME=""
          WIDGET_PROFILE_NAME=""

          echo "Buscando profiles instalados para os tres bundles..."
          for profile in "$PROFILES_HOME"/*.mobileprovision "$XCODE_PROFILES_HOME"/*.mobileprovision; do
            if [ -f "$profile" ]; then
              security cms -D -i "$profile" > /tmp/profile_temp.plist
              APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile_temp.plist 2>/dev/null || true)
              PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile_temp.plist 2>/dev/null || true)
              echo " - $APP_IDENTIFIER  =>  $PROFILE_NAME"

              if [[ "$APP_IDENTIFIER" == *".com.temporun.watch.watchkitapp.watchkitextension" ]]; then
                WIDGET_PROFILE_NAME="$PROFILE_NAME"
              elif [[ "$APP_IDENTIFIER" == *".com.temporun.watch.watchkitapp" ]]; then
                WATCH_PROFILE_NAME="$PROFILE_NAME"
              elif [[ "$APP_IDENTIFIER" == *".com.temporun.watch" ]]; then
                STUB_PROFILE_NAME="$PROFILE_NAME"
              fi
            fi
          done

          if [ -z "$STUB_PROFILE_NAME" ]; then
            echo "ERRO: Profile do iOS Stub (com.temporun.watch) nao encontrado!"
            exit 1
          fi
          if [ -z "$WATCH_PROFILE_NAME" ]; then
            echo "ERRO: Profile do Watch App (com.temporun.watch.watchkitapp) nao encontrado!"
            exit 1
          fi
          if [ -z "$WIDGET_PROFILE_NAME" ]; then
            echo "ERRO: Profile do Widget (com.temporun.watch.watchkitapp.watchkitextension) nao encontrado!"
            exit 1
          fi
          echo "Stub:   $STUB_PROFILE_NAME"
          echo "Watch:  $WATCH_PROFILE_NAME"
          echo "Widget: $WIDGET_PROFILE_NAME"

          export STUB_PROFILE_NAME WATCH_PROFILE_NAME WIDGET_PROFILE_NAME

          # 2. Injetar perfis especificos por bundle id no pbxproj
          ruby -e '
            project_file = File.join("TempoRunWatch.xcodeproj", "project.pbxproj")
            stub_profile = ENV.fetch("STUB_PROFILE_NAME")
            watch_profile = ENV.fetch("WATCH_PROFILE_NAME")
            widget_profile = ENV.fetch("WIDGET_PROFILE_NAME")
            team_id = "N48XV6SR5A"

            profiles = {
              "com.temporun.watch" => stub_profile,
              "com.temporun.watch.watchkitapp" => watch_profile,
              "com.temporun.watch.watchkitapp.watchkitextension" => widget_profile,
            }

            lines = File.readlines(project_file)
            new_lines = []
            in_build_configuration = false
            config_block = []

            lines.each do |line|
              if line =~ /buildSettings = \{/
                in_build_configuration = true
                config_block = [line]
              elsif in_build_configuration
                config_block << line
                if line =~ /\};/
                  in_build_configuration = false
                  block_text = config_block.join

                  if block_text =~ /PRODUCT_BUNDLE_IDENTIFIER = ([^;]+);/
                    bundle_id = $1.strip.gsub(/[^a-zA-Z0-9.-]/, "")
                    profile = profiles[bundle_id]

                    block_text.gsub!(/CODE_SIGN_STYLE = [^;]+;/, "CODE_SIGN_STYLE = Manual;")
                    block_text.gsub!(/DEVELOPMENT_TEAM = [^;]+;/, "DEVELOPMENT_TEAM = #{team_id};")
                    block_text.gsub!(/CODE_SIGN_IDENTITY = [^;]+;/, "CODE_SIGN_IDENTITY = \"Apple Distribution\";")

                    if profile
                      if block_text.include?("PROVISIONING_PROFILE_SPECIFIER")
                        block_text.gsub!(/PROVISIONING_PROFILE_SPECIFIER = [^;]+;/, "PROVISIONING_PROFILE_SPECIFIER = \"#{profile}\";")
                      else
                        block_text.gsub!(/(PRODUCT_BUNDLE_IDENTIFIER = [^;]+;\n)/, "\\1\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"#{profile}\";\n")
                      end
                    end
                  end
                  new_lines << block_text
                end
              else
                new_lines << line
              end
            end
            File.write(project_file, new_lines.join)
          '

          # 3. Arquivar o app iOS (que embarca o watch app + widget)
          echo "Arquivando app iOS (contendo o watch app)..."
          xcodebuild \
            -project TempoRunWatch.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/xcarchive/TempoRunStub.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=N48XV6SR5A \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution"

          # 3b. Verificar entitlements assinados no watch app
          echo "=== Entitlements assinados no Watch App ==="
          WATCH_APP_DIAG=$(find "build/ios/xcarchive/TempoRunStub.xcarchive" -name "TempoRunWatch.app" | grep -v "\.dSYM" | head -1)
          if [ -n "$WATCH_APP_DIAG" ]; then
            echo "Watch app: $WATCH_APP_DIAG"
            codesign -d --entitlements :- "$WATCH_APP_DIAG" 2>/dev/null | xmllint --format - 2>/dev/null || \
              codesign -d --entitlements - "$WATCH_APP_DIAG" 2>&1 || true
          else
            echo "WATCH APP NAO ENCONTRADO no archive!"
            find "build/ios/xcarchive/TempoRunStub.xcarchive" -name "*.app" || true
          fi

          # 4. Empacotar o IPA manualmente a partir do .xcarchive.
          #    O `xcodebuild -exportArchive` falha na imagem do Codemagic com
          #    "IDEDistributionMethodManager: Unknown Distribution Error" — o
          #    framework de distribuicao do Xcode nao carrega nenhum metodo
          #    ({} vazio), entao recusa app-store / app-store-connect.
          #    Como o archive ja foi assinado com "Apple Distribution" + os
          #    profiles de distribuicao, montamos o IPA no formato canonico
          #    Payload/ (sem re-assinar) e o publishing faz o upload via API key.
          #    Deploy targets iOS 17 / watchOS 10 tem Swift na propria OS, logo
          #    nao e preciso pasta SwiftSupport.
          echo "Empacotando IPA manualmente a partir do archive..."
          ARCHIVE_APPS="build/ios/xcarchive/TempoRunStub.xcarchive/Products/Applications"
          APP_PATH=$(ls -d "$ARCHIVE_APPS"/*.app 2>/dev/null | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: nenhum .app encontrado em $ARCHIVE_APPS"
            ls -la "$ARCHIVE_APPS" || true
            exit 1
          fi
          echo "App principal: $APP_PATH"
          echo "Conteudo embarcado:"
          ls -la "$APP_PATH/Watch" 2>/dev/null || echo " (sem pasta Watch?)"

          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/

          ( cd build/ios/ipa && zip -qry TempoRunStub.ipa Payload && rm -rf Payload )

          echo "=== IPA empacotado ==="
          ls -la build/ios/ipa

          # Verifica entitlements assinados (diagnostico)
          echo "=== Entitlements do iOS Stub ==="
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null | plutil -p - 2>/dev/null || \
            codesign -d --entitlements - "$APP_PATH" 2>&1 | head -n 40 || true

          WATCH_APP=$(find "build/ios/xcarchive/TempoRunStub.xcarchive" -name "TempoRunWatch.app" | head -1)
          if [ -n "$WATCH_APP" ]; then
            echo "=== Entitlements do Watch App ($WATCH_APP) ==="
            codesign -d --entitlements :- "$WATCH_APP" 2>/dev/null | plutil -p - 2>/dev/null || \
              codesign -d --entitlements - "$WATCH_APP" 2>&1 | head -n 40 || true
            echo "=== Provisioning profile embarcado no Watch App ==="
            security cms -D -i "$WATCH_APP/embedded.mobileprovision" 2>/dev/null | \
              /usr/libexec/PlistBuddy -c "Print :Entitlements" /dev/stdin 2>/dev/null || true
          fi

    artifacts:
      - apple/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - apple/**/*.dSYM.zip

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
