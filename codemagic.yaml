workflows:
  temporun-watch-ios:
    name: TempoRun Watch — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: claude/peaceful-noether-VC4aB
          include: true

    environment:
      xcode: latest
      groups:
        - TEMPORUN-WATCH-SECRETS
      vars:
        XCODE_SCHEME: TempoRunWatch
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.temporun.run.watchkitapp

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        working_directory: apple
        script: xcodegen generate

      - name: Aplicar profiles no projeto
        working_directory: apple
        script: xcode-project use-profiles

      - name: Archive
        working_directory: apple
        script: |
          xcodebuild \
            -project TempoRunWatch.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=watchOS" \
            -configuration Release \
            -archivePath build/ios/xcarchive/TempoRunWatch.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=N48XV6SR5A \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual

      - name: Empacotar IPA (manual, sem exportArchive)
        working_directory: apple
        script: |
          set -e
          ARCHIVE="build/ios/xcarchive/TempoRunWatch.xcarchive"
          APP="$ARCHIVE/Products/Applications/TempoRunWatch.app"
          if [ ! -d "$APP" ]; then
            echo "ERRO: .app nao encontrado em $APP"
            echo "Conteudo de Products:"
            ls -R "$ARCHIVE/Products" || true
            exit 1
          fi
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP" build/ios/ipa/Payload/
          (cd build/ios/ipa && zip -qry TempoRunWatch.ipa Payload && rm -rf Payload)
          echo "IPA gerado:"
          ls -la build/ios/ipa

    artifacts:
      - apple/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - apple/**/*.dSYM.zip

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
