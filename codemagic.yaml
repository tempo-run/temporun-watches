workflows:
  temporun-watch-ios:
    name: TempoRun Watch — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: claude/peaceful-noether-VC4aB
          include: true

    environment:
      xcode: latest
      groups:
        - TEMPORUN-WATCH-SECRETS
      vars:
        XCODE_SCHEME: TempoRunWatch
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.temporun.run.watchkitapp

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        working_directory: apple
        script: xcodegen generate

      - name: Aplicar profiles no projeto
        working_directory: apple
        script: xcode-project use-profiles

      - name: Build IPA (archive + export)
        working_directory: apple
        script: |
          set -e

          # 1. Encontrar o profile de watchOS instalado pelo use-profiles
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          XCODE_PROFILES_HOME="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          SELECTED_PROFILE=""
          SELECTED_PROFILE_NAME=""
          BUNDLE_ID="com.temporun.run.watchkitapp"

          echo "Buscando profiles para o bundle: $BUNDLE_ID..."
          for profile in "$PROFILES_HOME"/*.mobileprovision "$XCODE_PROFILES_HOME"/*.mobileprovision; do
            if [ -f "$profile" ]; then
              security cms -D -i "$profile" > /tmp/profile_watch.plist
              APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile_watch.plist 2>/dev/null || true)
              
              if [[ "$APP_IDENTIFIER" == *".$BUNDLE_ID" ]]; then
                SELECTED_PROFILE="$profile"
                SELECTED_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile_watch.plist)
                break
              fi
            fi
          done

          if [ -z "$SELECTED_PROFILE_NAME" ]; then
            echo "ERRO: Nenhum profile de assinatura encontrado para o bundle $BUNDLE_ID!"
            exit 1
          fi

          echo "Profile de watchOS encontrado: $SELECTED_PROFILE_NAME"

          # 2. Injetar a assinatura manual no project.pbxproj gerado pelo XcodeGen
          export SELECTED_PROFILE_NAME
          export BUNDLE_ID
          ruby -e '
            project_file = File.join("TempoRunWatch.xcodeproj", "project.pbxproj")
            profile_name = ENV.fetch("SELECTED_PROFILE_NAME")
            bundle_id = ENV.fetch("BUNDLE_ID")
            team_id = "N48XV6SR5A"
            text = File.read(project_file)

            # Forçar manual signing e atribuir o profile correto
            text = text.gsub(/CODE_SIGN_STYLE = [^;]+;/, "CODE_SIGN_STYLE = Manual;")
            text = text.gsub(/DEVELOPMENT_TEAM = [^;]+;/, "DEVELOPMENT_TEAM = #{team_id};")
            text = text.gsub(/CODE_SIGN_IDENTITY = [^;]+;/, "CODE_SIGN_IDENTITY = \"Apple Distribution\";")
            text = text.gsub(/PROVISIONING_PROFILE_SPECIFIER = [^;]+;/, "PROVISIONING_PROFILE_SPECIFIER = \"#{profile_name}\";")

            unless text.include?("DEVELOPMENT_TEAM = #{team_id};")
              text = text.gsub(/(CODE_SIGN_STYLE = Manual;\n)/, "\\1\t\t\t\tDEVELOPMENT_TEAM = #{team_id};\n")
            end

            unless text.include?("PROVISIONING_PROFILE_SPECIFIER = \"#{profile_name}\";")
              text = text.gsub(/(PRODUCT_BUNDLE_IDENTIFIER = #{Regexp.escape(bundle_id)};\n)/, "\\1\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"#{profile_name}\";\n")
            end

            File.write(project_file, text)
          '

          # 3. Gerar o ExportOptions.plist específico para o Apple Watch
          EXPORT_OPTIONS_PLIST="/tmp/temporun-watch-export-options.plist"
          cat > "$EXPORT_OPTIONS_PLIST" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>N48XV6SR5A</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.temporun.run.watchkitapp</key>
              <string>${SELECTED_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          # 4. Arquivar para watchOS (usando o SDK e destination corretos)
          echo "Arquivando app watchOS..."
          xcodebuild \
            -project TempoRunWatch.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk watchos \
            -destination "generic/platform=watchOS" \
            -archivePath build/ios/xcarchive/TempoRunWatch.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=N48XV6SR5A \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution"

          # 5. Exportar o IPA
          echo "Exportando IPA para TestFlight..."
          xcodebuild \
            -exportArchive \
            -archivePath build/ios/xcarchive/TempoRunWatch.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -exportPath build/ios/ipa
