workflows:
  temporun-watch-ios:
    name: TempoRun Watch — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      vars:
        XCODE_SCHEME: TempoRunWatch
        BUNDLE_ID: com.temporun.run.watchkitapp
        BUNDLE_ID_WIDGET: com.temporun.run.watchkitapp.watchkitextension
      groups:
        - TEMPORUN-WATCH-SECRETS

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        working_directory: apple
        script: xcodegen generate

      - name: Instalar provisioning profiles
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"

          # Decodifica cada profile salvo no Codemagic e instala
          find "$CM_BUILD_DIR" -name "*.mobileprovision" -exec cp {} "$PROFILES_HOME/" \; 2>/dev/null || true

          # Alternativa: usar keychain do Codemagic
          keychain initialize

      - name: Build watchOS (archive)
        working_directory: apple
        script: |
          xcodebuild \
            -project TempoRunWatch.xcodeproj \
            -scheme $XCODE_SCHEME \
            -destination "generic/platform=watchOS" \
            -configuration Release \
            -archivePath build/TempoRunWatch.xcarchive \
            archive \
            DEVELOPMENT_TEAM=N48XV6SR5A \
            CODE_SIGN_STYLE=Manual \
            "PROVISIONING_PROFILE_SPECIFIER=TempoRun Watch Distribution" \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Export IPA
        working_directory: apple
        script: |
          xcodebuild -exportArchive \
            -archivePath build/TempoRunWatch.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - apple/build/export/*.ipa
      - apple/build/export/*.dSYM.zip

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PVT_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
