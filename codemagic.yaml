workflows:
  temporun-watch-ios:
    name: TempoRun Watch — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      groups:
        - TEMPORUN-WATCH-SECRETS
      vars:
        XCODE_SCHEME: TempoRunWatch
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.temporun.run.watchkitapp

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        working_directory: apple
        script: xcodegen generate

      - name: Aplicar profiles no projeto
        working_directory: apple
        script: xcode-project use-profiles

      - name: Build watchOS (archive)
        working_directory: apple
        script: |
          xcodebuild \
            -project TempoRunWatch.xcodeproj \
            -scheme $XCODE_SCHEME \
            -destination "generic/platform=watchOS" \
            -configuration Release \
            -archivePath build/TempoRunWatch.xcarchive \
            archive

      - name: Export IPA
        working_directory: apple
        script: |
          xcodebuild -exportArchive \
            -archivePath build/TempoRunWatch.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions.plist

    artifacts:
      - apple/build/export/*.ipa
      - apple/build/export/*.dSYM.zip

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
