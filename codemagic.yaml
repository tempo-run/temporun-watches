workflows:
  temporun-watch-ios:
    name: TempoRun Watch — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.temporun.run.watchkitapp
      vars:
        BUNDLE_ID: com.temporun.run.watchkitapp
        XCODE_SCHEME: TempoRunWatch

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        working_directory: apple
        script: xcodegen generate

      - name: Instalar dependências (se houver)
        working_directory: apple
        script: |
          if [ -f Podfile ]; then pod install; fi

      - name: Build watchOS
        working_directory: apple
        script: |
          xcodebuild \
            -project TempoRunWatch.xcodeproj \
            -scheme $XCODE_SCHEME \
            -destination "generic/platform=watchOS" \
            -configuration Release \
            -archivePath build/TempoRunWatch.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="TempoRun Watch Distribution"

      - name: Export IPA
        working_directory: apple
        script: |
          xcodebuild -exportArchive \
            -archivePath build/TempoRunWatch.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions.plist

    artifacts:
      - apple/build/export/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
