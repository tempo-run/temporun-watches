workflows:
  temporun-watch-ios:
    name: TempoRun Watch — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      groups:
        - TEMPORUN-WATCH-SECRETS
      vars:
        XCODE_SCHEME: TempoRunWatch
        BUNDLE_ID: com.temporun.run.watchkitapp
        BUNDLE_ID_WIDGET: com.temporun.run.watchkitapp.watchkitextension

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Configurar keychain e instalar profiles
        script: |
          # Cria keychain temporário
          KEYCHAIN_PATH=$HOME/Library/Keychains/build.keychain
          KEYCHAIN_PASSWORD=buildpwd123
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Instala certificado
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Instala provisioning profiles
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY \
            --profiles-dir "$PROFILES_DIR" \
            --create

          app-store-connect fetch-signing-files $BUNDLE_ID_WIDGET \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY \
            --profiles-dir "$PROFILES_DIR" \
            --create

          ls "$PROFILES_DIR"

      - name: Gerar projeto Xcode
        working_directory: apple
        script: xcodegen generate

      - name: Aplicar profiles no projeto
        working_directory: apple
        script: xcode-project use-profiles

      - name: Build watchOS (archive)
        working_directory: apple
        script: |
          xcodebuild \
            -project TempoRunWatch.xcodeproj \
            -scheme $XCODE_SCHEME \
            -destination "generic/platform=watchOS" \
            -configuration Release \
            -archivePath build/TempoRunWatch.xcarchive \
            archive

      - name: Export IPA
        working_directory: apple
        script: |
          xcodebuild -exportArchive \
            -archivePath build/TempoRunWatch.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions.plist

    artifacts:
      - apple/build/export/*.ipa
      - apple/build/export/*.dSYM.zip

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
