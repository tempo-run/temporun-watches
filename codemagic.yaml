workflows:
  temporun-watch-ios:
    name: TempoRun Watch — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: claude/peaceful-noether-VC4aB
          include: true

    environment:
      xcode: "16"
      groups:
        - TEMPORUN-WATCH-SECRETS
      vars:
        XCODE_SCHEME: TempoRunWatch
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.temporun.run.watchkitapp

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        working_directory: apple
        script: xcodegen generate

      - name: Aplicar profiles no projeto
        working_directory: apple
        script: xcode-project use-profiles

      - name: Build IPA (archive + export)
        working_directory: apple
        script: |
          set -e

          # 1. Mapear os dois profiles instalados na máquina do Codemagic
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          XCODE_PROFILES_HOME="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          
          WATCH_PROFILE_NAME=""
          WIDGET_PROFILE_NAME=""

          echo "Buscando profiles instalados para os dois bundles..."
          for profile in "$PROFILES_HOME"/*.mobileprovision "$XCODE_PROFILES_HOME"/*.mobileprovision; do
            if [ -f "$profile" ]; then
              security cms -D -i "$profile" > /tmp/profile_temp.plist
              APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile_temp.plist 2>/dev/null || true)
              PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile_temp.plist 2>/dev/null || true)
              
              if [[ "$APP_IDENTIFIER" == *".com.temporun.run.watchkitapp" ]]; then
                WATCH_PROFILE_NAME="$PROFILE_NAME"
                echo "Encontrado profile do Watch App: $WATCH_PROFILE_NAME"
              elif [[ "$APP_IDENTIFIER" == *".com.temporun.run.watchkitapp.watchkitextension" ]]; then
                WIDGET_PROFILE_NAME="$PROFILE_NAME"
                echo "Encontrado profile do Widget: $WIDGET_PROFILE_NAME"
              fi
            fi
          done

          if [ -z "$WATCH_PROFILE_NAME" ]; then
            echo "ERRO: Profile do Watch App não encontrado!"
            exit 1
          fi
          if [ -z "$WIDGET_PROFILE_NAME" ]; then
            echo "ERRO: Profile do Widget Extension não encontrado!"
            exit 1
          fi

          # Exportar variáveis para o script Ruby
          export WATCH_PROFILE_NAME
          export WIDGET_PROFILE_NAME

          # 2. Injetar perfis correspondentes especificamente a cada target no pbxproj
          ruby -e '
            project_file = File.join("TempoRunWatch.xcodeproj", "project.pbxproj")
            watch_profile = ENV.fetch("WATCH_PROFILE_NAME")
            widget_profile = ENV.fetch("WIDGET_PROFILE_NAME")
            team_id = "N48XV6SR5A"
            
            lines = File.readlines(project_file)
            new_lines = []
            in_build_configuration = false
            config_block = []
            
            lines.each do |line|
              if line =~ /buildSettings = \{/
                in_build_configuration = true
                config_block = [line]
              elsif in_build_configuration
                config_block << line
                if line =~ /\};/
                  in_build_configuration = false
                  block_text = config_block.join
                  
                  if block_text =~ /PRODUCT_BUNDLE_IDENTIFIER = ([^;]+);/
                    bundle_id = $1.strip.gsub(/[^a-zA-Z0-9.-]/, "")
                    
                    block_text.gsub!(/CODE_SIGN_STYLE = [^;]+;/, "CODE_SIGN_STYLE = Manual;")
                    block_text.gsub!(/DEVELOPMENT_TEAM = [^;]+;/, "DEVELOPMENT_TEAM = #{team_id};")
                    block_text.gsub!(/CODE_SIGN_IDENTITY = [^;]+;/, "CODE_SIGN_IDENTITY = \"Apple Distribution\";")
                    
                    if bundle_id == "com.temporun.run.watchkitapp"
                      block_text.gsub!(/PROVISIONING_PROFILE_SPECIFIER = [^;]+;/, "PROVISIONING_PROFILE_SPECIFIER = \"#{watch_profile}\";")
                      unless block_text.include?("PROVISIONING_PROFILE_SPECIFIER")
                        block_text.gsub!(/(PRODUCT_BUNDLE_IDENTIFIER = [^;]+;\n)/, "\\1\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"#{watch_profile}\";\n")
                      end
                    elsif bundle_id == "com.temporun.run.watchkitapp.watchkitextension"
                      block_text.gsub!(/PROVISIONING_PROFILE_SPECIFIER = [^;]+;/, "PROVISIONING_PROFILE_SPECIFIER = \"#{widget_profile}\";")
                      unless block_text.include?("PROVISIONING_PROFILE_SPECIFIER")
                        block_text.gsub!(/(PRODUCT_BUNDLE_IDENTIFIER = [^;]+;\n)/, "\\1\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"#{widget_profile}\";\n")
                      end
                    end
                  end
                  new_lines << block_text
                end
              else
                new_lines << line
              end
            end
            File.write(project_file, new_lines.join)
          '

          # 3. Gerar o ExportOptions.plist com os dois perfis mapeados
          EXPORT_OPTIONS_PLIST="/tmp/temporun-watch-export-options.plist"
          cat > "$EXPORT_OPTIONS_PLIST" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>N48XV6SR5A</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.temporun.run.watchkitapp</key>
              <string>${WATCH_PROFILE_NAME}</string>
              <key>com.temporun.run.watchkitapp.watchkitextension</key>
              <string>${WIDGET_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          # 4. Arquivar para watchOS
          echo "Arquivando app watchOS..."
          xcodebuild \
            -project TempoRunWatch.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk watchos \
            -destination "generic/platform=watchOS" \
            -archivePath build/ios/xcarchive/TempoRunWatch.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=N48XV6SR5A \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution"

          # 5. Empacotar o IPA manualmente.
          #    O xcodebuild -exportArchive falha nesta imagem do Codemagic
          #    porque o IDEDistributionMethodManager nao carrega os metodos
          #    de distribuicao ("Unknown Distribution Error") e cai num
          #    conjunto reduzido que exclui App Store. Como o .app ja sai
          #    totalmente assinado (Apple Distribution + provisioning profile)
          #    do passo de archive, montamos o IPA manualmente (Payload/).
          echo "Empacotando IPA manualmente a partir do .xcarchive..."
          APP_PATH="build/ios/xcarchive/TempoRunWatch.xcarchive/Products/Applications/TempoRunWatch.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERRO: .app assinado nao encontrado em $APP_PATH"
            exit 1
          fi

          rm -rf build/ios/ipa build/ios/Payload
          mkdir -p build/ios/ipa build/ios/Payload
          cp -R "$APP_PATH" build/ios/Payload/

          ( cd build/ios && zip -r -y -q ipa/TempoRunWatch.ipa Payload )
          rm -rf build/ios/Payload

          echo "=== IPA gerado ==="
          ls -la build/ios/ipa

    artifacts:
      - apple/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - apple/**/*.dSYM.zip

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
