workflows:
  temporun-watch-ios:
    name: TempoRun Watch — Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      groups:
        - TEMPORUN-WATCH-SECRETS
      vars:
        XCODE_SCHEME: TempoRunWatch
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.temporun.run.watchkitapp

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar projeto Xcode
        working_directory: apple
        script: xcodegen generate

      - name: Aplicar profiles no projeto
        working_directory: apple
        script: xcode-project use-profiles

      - name: Archive
        working_directory: apple
        script: |
          xcodebuild \
            -project TempoRunWatch.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=watchOS" \
            -configuration Release \
            -archivePath build/ios/xcarchive/TempoRunWatch.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=N48XV6SR5A \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual

      - name: Export IPA
        working_directory: apple
        script: |
          cat > /tmp/export_options.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>export</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.temporun.run.watchkitapp</key>
                  <string>TempoRun Watch Distribution</string>
                  <key>com.temporun.run.watchkitapp.watchkitextension</key>
                  <string>TempoRun Watch Extension Distribution</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/TempoRunWatch.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/export_options.plist \
            COMPILER_INDEX_STORE_ENABLE=NO

    artifacts:
      - apple/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - apple/**/*.dSYM.zip

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
